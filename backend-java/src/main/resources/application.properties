# H2 database for local learning and development.
spring.datasource.url=jdbc:h2:mem:taskdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Browser console: http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Let Hibernate create tables from JPA entities during local development.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Keep database access inside service/repository boundaries, not view rendering.
spring.jpa.open-in-view=false
